<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henry Demo Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat { width: 600px; max-width: 100vw; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
    .header { padding: 16px 20px; border-bottom: 1px solid #eee; font-weight: 600; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 10px 16px; border-radius: 18px; max-width: 80%; line-height: 1.5; }
    .msg.user { background: #007aff; color: white; align-self: flex-end; border-radius: 18px 18px 4px 18px; }
    .msg.bot { background: #e9e9eb; color: #333; align-self: flex-start; border-radius: 18px 18px 18px 4px; }
    .api-toggle { padding: 6px 20px 4px; font-size: 12px; }
    .api-toggle a { color: #007aff; cursor: pointer; text-decoration: none; }
    .api-toggle a:hover { text-decoration: underline; }
    .api-bar { padding: 4px 20px 8px; display: none; gap: 8px; align-items: center; }
    .api-bar.visible { display: flex; }
    .api-bar label { font-size: 12px; color: #666; white-space: nowrap; }
    .api-bar input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; outline: none; font-family: monospace; }
    .api-bar input:focus { border-color: #007aff; }
    .model-bar { padding: 4px 20px 8px; display: flex; gap: 8px; align-items: center; }
    .model-bar label { font-size: 12px; color: #666; white-space: nowrap; }
    .model-bar select { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; outline: none; }
    .model-bar select:focus { border-color: #007aff; }
    .input-area { padding: 8px 16px 16px; display: flex; gap: 8px; }
    .input-area input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
    .input-area input:focus { border-color: #007aff; }
    .input-area button { padding: 10px 20px; background: #007aff; color: white; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; }
    .input-area button:disabled { opacity: 0.5; cursor: default; }
    .error { color: #d32f2f; font-size: 13px; padding: 0 20px 8px; }
    .loading { align-self: center; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">Henry Demo Chatbot</div>
    <div class="messages" id="messages"></div>
    <div id="error" class="error"></div>
    <div class="api-toggle">
      <a id="apiToggleLink">Use custom API key</a>
    </div>
    <div class="api-bar" id="apiBar">
      <label for="apiKeyInput">API Key:</label>
      <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
    </div>
    <div class="model-bar">
      <label for="modelSelect">Model:</label>
      <select id="modelSelect"></select>
      <label style="font-size:12px;color:#666;white-space:nowrap;margin-left:8px">
        <input type="checkbox" id="freeOnly"> Free only
      </label>
    </div>
    <form class="input-area" id="form">
      <input type="text" id="input" placeholder="Type a message..." autofocus>
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const errorEl = document.getElementById('error');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiBar = document.getElementById('apiBar');
    const apiToggleLink = document.getElementById('apiToggleLink');
    const freeOnly = document.getElementById('freeOnly');

    let allModels = [];
    let savedKey = localStorage.getItem('openrouter_key') || '';
    if (savedKey) {
      apiKeyInput.value = savedKey;
      apiBar.classList.add('visible');
      apiToggleLink.textContent = 'Hide custom API key';
    }

    apiKeyInput.addEventListener('input', () => {
      localStorage.setItem('openrouter_key', apiKeyInput.value);
    });

    apiToggleLink.addEventListener('click', () => {
      const show = !apiBar.classList.contains('visible');
      apiBar.classList.toggle('visible', show);
      apiToggleLink.textContent = show ? 'Hide custom API key' : 'Use custom API key';
      if (!show) {
        apiKeyInput.value = '';
        localStorage.removeItem('openrouter_key');
        loadModels();
      }
    });

    function renderModels() {
      const filtered = freeOnly.checked ? allModels.filter(m => m.free) : allModels;
      modelSelect.innerHTML = filtered.map(m => `<option value="${m.id}">${m.id}</option>`).join('');
    }

    async function loadModels() {
      const key = apiKeyInput.value;
      try {
        const res = await fetch('/models', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: key }),
        });
        const data = await res.json();
        allModels = data.models || [];
        renderModels();
        if (data.default_model && modelSelect.querySelector(`option[value="${data.default_model}"]`)) {
          modelSelect.value = data.default_model;
        }
      } catch {
        // keep dropdown empty if fetch fails
      }
    }

    freeOnly.addEventListener('change', renderModels);
    apiKeyInput.addEventListener('change', loadModels);
    loadModels();

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function setLoading(show) {
      const existing = document.getElementById('loading');
      if (show) {
        if (!existing) {
          const el = document.createElement('div');
          el.id = 'loading';
          el.className = 'loading';
          el.textContent = 'Thinking...';
          messages.appendChild(el);
          messages.scrollTop = messages.scrollHeight;
        }
      } else {
        existing?.remove();
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      errorEl.textContent = '';
      sendBtn.disabled = true;
      setLoading(true);

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, model: modelSelect.value, api_key: apiKeyInput.value }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Request failed');
        }
        const data = await res.json();
        addMessage(data.reply, 'bot');
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        setLoading(false);
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
