name: CI/CD Build and Tag Update

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with the unique git commit SHA
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          # Dynamically builds: YOUR_USERNAME/YOUR_GITOPS_REPO_NAME
          repository: '${{ github.repository_owner }}/gitops'
          token: ${{ secrets.GITOPS_PAT }} # Uses the secret token you added in Step 2

      - name: Update Image Tag in Deployment Manifest
        run: |
          # Finds the image line in your manifest and updates it to the new image tag
          sed -i "s|image: ghcr.io/.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Commit and Push Changes to GitOps Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git commit -am "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
